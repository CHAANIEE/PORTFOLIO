<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact - Portfolio</title>
    
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- Font Awesome for icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        body {
            background: #0c0c0c;
            color: white;
            font-family: 'Poppins', sans-serif;
            line-height: 1.6;
        }
        
        section {
            padding: 100px 0;
        }
        
        .navbar {
            background: #0c0c0c;
            padding: 20px 0;
            border-bottom: 1px solid #222;
        }
        
        .navbar-brand {
            font-size: 24px;
            letter-spacing: 2px;
        }
        
        .nav-link {
            font-size: 16px;
            margin-left: 30px;
            transition: color 0.3s ease;
        }
        
        .nav-link:hover {
            color: #aaa !important;
        }
        
        .display-3 {
            font-weight: 700;
            margin-bottom: 15px;
        }
        
        .text-secondary {
            color: #aaa !important;
        }
        
        .contact-info {
            max-width: 600px;
            margin: 0 auto;
        }
        
        .contact-text {
            font-size: 20px;
            margin-bottom: 15px;
        }
        
        .dm-text {
            font-size: 18px;
            color: #aaa;
            margin-bottom: 40px;
        }
        
        .social-links {
            display: flex;
            flex-direction: column;
            gap: 20px;
            align-items: center;
        }
        
        .social-link {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
            color: white;
            text-decoration: none;
            font-size: 20px;
            padding: 15px 30px;
            border: 1px solid #333;
            border-radius: 50px;
            width: 250px;
            transition: all 0.3s ease;
            background: #111;
        }
        
        .social-link i {
            font-size: 24px;
        }
        
        .social-link:hover {
            background: white;
            color: #0c0c0c;
            border-color: white;
            transform: translateY(-3px);
        }
        
        .linkedin:hover {
            background: #0077b5;
            border-color: #0077b5;
            color: white;
        }
        
        .github:hover {
            background: #6e5494;
            border-color: #6e5494;
            color: white;
        }
        
        .facebook:hover {
            background: #4267B2;
            border-color: #4267B2;
            color: white;
        }
        
        footer {
            margin-top: 40px;
        }
        
        @media (max-width: 768px) {
            section {
                padding: 60px 0;
            }
            
            .display-3 {
                font-size: 2.5rem;
            }
            
            .contact-text {
                font-size: 18px;
            }
            
            .dm-text {
                font-size: 16px;
            }
            
            .social-link {
                width: 220px;
                font-size: 18px;
                padding: 12px 25px;
            }
            
            .nav-link {
                margin-left: 15px;
            }
        }
    </style>
</head>

<body>
    <!-- NAVBAR -->
    <nav class="navbar navbar-expand-lg">
        <div class="container">
            <a class="navbar-brand text-white fw-bold" href="contact.html">Web Programmer</a>
            
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item">
                        <a class="nav-link text-white" href="index1.html">Home</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link text-white" href="studied.html">Studied</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link text-white active" href="contact.html">Contact</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <!-- CONTACT SECTION -->
    <section class="text-center">
        <div class="container">
            <div class="contact-info">
                <h1 class="display-3 fw-bold">Contact Me</h1>
                
                <p class="contact-text">Feel free to send me a DM</p>
                
                <div class="social-links">
                    <!-- LinkedIn -->
                    <a href="https://www.linkedin.com/in/christian-lagula-0bb30433b/" class="social-link linkedin" target="_blank">
                        <i class="fab fa-linkedin-in"></i>
                        LinkedIn
                    </a>
                    
                    <!-- GitHub -->
                    <a href="https://github.com/CHAANIEE" class="social-link github" target="_blank">
                        <i class="fab fa-github"></i>
                        GitHub
                    </a>
                    
                    <!-- Facebook -->
                    <a href="https://www.facebook.com/chichandachi" class="social-link facebook" target="_blank">
                        <i class="fab fa-facebook-f"></i>
                        Facebook
                    </a>
                </div>
            </div>
        </div>
    </section>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
